openapi: 3.0.3
info:
  title: Hugs as a Service API
  version: 1.0.0
  description: Platform for hugging other users with rate limits, balance, and ranks
servers:
  - url: /api/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Gender:
      type: string
      enum:
        - male
        - female

    ErrorCode:
      type: string
      enum:
        - WEAK_PASSWORD
        - USER_ALREADY_EXISTS
        - INVALID_CREDENTIALS
        - USER_NOT_FOUND
        - CANNOT_HUG_SELF
        - COOLDOWN_ACTIVE
        - INSUFFICIENT_BALANCE
        - WRONG_PASSWORD
        - USER_BANNED
        - CANNOT_BAN_ADMIN
        - ALREADY_HAS_PENDING_HUG
        - HUG_NOT_FOUND
        - HUG_NOT_PENDING
        - HUG_EXPIRED
        - DECLINE_COOLDOWN_ACTIVE
        - PENDING_HUG_EXISTS
        - MAX_SLOTS_REACHED
        - USER_BLOCKED

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code: { $ref: '#/components/schemas/ErrorCode' }
        message: { type: string }

    User:
      type: object
      required:
        - id
        - username
        - role
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [user, admin] }
        gender:
          $ref: '#/components/schemas/Gender'

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token: { type: string }
        user : { $ref: '#/components/schemas/User' }

    Balance:
      type: object
      required:
        - user_id
        - amount
      properties:
        user_id: { type: string, format: uuid }
        amount: { type: integer }

    Hug:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - status
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        receiver_username: { type: string }
        receiver_gender: { $ref: '#/components/schemas/Gender' }
        status: { type: string, enum: [pending, completed, declined, expired, cancelled] }
        created_at: { type: string, format: date-time }
        accepted_at: { type: string, format: date-time }

    HugFeedItem:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - giver_username
        - receiver_username
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        giver_username: { type: string }
        receiver_username: { type: string }
        giver_gender:
          $ref: '#/components/schemas/Gender'
        created_at: { type: string, format: date-time }

    CooldownInfo:
      type: object
      required:
        - user_a_id
        - user_b_id
        - cooldown_seconds
        - remaining_seconds
        - can_hug
      properties:
        user_a_id: { type: string, format: uuid }
        user_b_id: { type: string, format: uuid }
        cooldown_seconds: { type: integer }
        remaining_seconds: { type: integer }
        can_hug: { type: boolean }
        decline_cooldown_remaining: { type: integer }

    UserProfile:
      type: object
      required:
        - id
        - username
        - role
        - hugs_given
        - hugs_received
        - total_hugs
        - rank
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        hugs_given: { type: integer }
        hugs_received: { type: integer }
        total_hugs: { type: integer }
        rank: { type: string }
        balance: { type: integer }
        mutual_total: { type: integer }
        mutual_given: { type: integer }
        mutual_received: { type: integer }
        is_blocked: { type: boolean }

    LeaderboardEntry:
      type: object
      required:
        - user_id
        - username
        - total_hugs
        - hugs_given
        - hugs_received
        - rank
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        total_hugs: { type: integer }
        hugs_given: { type: integer }
        hugs_received: { type: integer }
        rank: { type: string }

    DailyRewardResponse:
      type: object
      required:
        - amount
        - streak_days
        - new_balance
      properties:
        amount: { type: integer }
        streak_days: { type: integer }
        new_balance: { type: integer }
        already_claimed: { type: boolean }

    UserListItem:
      type: object
      required:
        - id
        - username
        - role
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'

    HugActivityItem:
      type: object
      required:
        - timestamp
        - count
      properties:
        timestamp: { type: string, format: date-time }
        count: { type: integer }

    PendingHugInboxItem:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - giver_username
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        giver_username: { type: string }
        giver_gender:
          $ref: '#/components/schemas/Gender'
        created_at: { type: string, format: date-time }

    OutgoingPendingHug:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - receiver_username
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        receiver_username: { type: string }
        receiver_gender:
          $ref: '#/components/schemas/Gender'
        created_at: { type: string, format: date-time }

    HugSlotInfo:
      type: object
      required:
        - total_slots
        - used_slots
      properties:
        total_slots: { type: integer }
        used_slots: { type: integer }
        next_slot_cost:
          type: integer
          nullable: true
          description: Cost of the next slot in coins, null if at max

    OutgoingHugsResponse:
      type: object
      required:
        - hugs
        - slots
      properties:
        hugs:
          type: array
          items:
            $ref: '#/components/schemas/OutgoingPendingHug'
        slots:
          $ref: '#/components/schemas/HugSlotInfo'

    BuySlotResponse:
      type: object
      required:
        - slots
        - new_balance
      properties:
        slots:
          $ref: '#/components/schemas/HugSlotInfo'
        new_balance: { type: integer }

    InboxCount:
      type: object
      required:
        - count
      properties:
        count: { type: integer }

    AdminUser:
      type: object
      required:
        - id
        - username
        - role
        - balance
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [user, admin] }
        gender:
          $ref: '#/components/schemas/Gender'
        banned_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        balance: { type: integer }

    AdminStats:
      type: object
      required:
        - total_users
        - banned_users
      properties:
        total_users: { type: integer }
        banned_users: { type: integer }

    BlockedUser:
      type: object
      required:
        - id
        - username
        - created_at
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        created_at: { type: string, format: date-time }

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit / cooldown active
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Gone:
      description: Resource expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /ping:
    get:
      summary: Ping endpoint
      operationId: getPing
      description: Returns a simple response to check if the server is alive
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status: { type: string }

  /admin/ping:
    get:
      summary: "admin ping (testing auth)"
      operationId: getAdminPing
      security:
        - BearerAuth: ["admin"]
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required:
                  - secret
                properties:
                  secret: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                  username:
                    type: string
                    minLength: 3
                    maxLength: 32
                    pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
                    description: 'Username must be 3-32 characters, start with a letter, and contain only letters, numbers, and underscores'
                  password:
                    type: string
                    minLength: 8
                    maxLength: 128
                    description: 'Password must be 8-128 characters, contain at least one letter, one digit, and one special character'
                  gender:
                    $ref: '#/components/schemas/Gender'

              additionalProperties: false
      responses:
        '201':
          description: User registered successfully
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 32
                password:
                  type: string
                  minLength: 1
                  maxLength: 128
              additionalProperties: false
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token cookie
      operationId: refreshToken
      description: >
        Uses the HttpOnly refresh_token cookie to issue a new access token.
        No Authorization header required.
      parameters:
        - in: cookie
          name: refresh_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New access token issued
          headers:
            Set-Cookie:
              description: Rotated refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                properties:
                  token: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/logout:
    post:
      summary: Logout and clear refresh token cookie
      operationId: logout
      description: Clears the HttpOnly refresh_token cookie.
      responses:
        '200':
          description: Logged out successfully
          headers:
            Set-Cookie:
              description: Clear refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }

  /users/me:
    get:
      summary: Get current user info
      operationId: getCurrentUser
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/settings:
    put:
      summary: Update current user settings
      operationId: updateUserSettings
      security:
        - BearerAuth: ["user", "admin"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gender:
                  $ref: '#/components/schemas/Gender'
              additionalProperties: false
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/password:
    put:
      summary: Change current user password
      operationId: changePassword
      security:
        - BearerAuth: ["user", "admin"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  minLength: 1
                  maxLength: 128
                new_password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: 'Password must be 8-128 characters, contain at least one letter, one digit, and one special character'
              additionalProperties: false
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/block:
    post:
      summary: Block a user
      operationId: blockUser
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User blocked
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Unblock a user
      operationId: unblockUser
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User unblocked
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/blocked:
    get:
      summary: Get list of blocked users
      operationId: getBlockedUsers
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: List of blocked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockedUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/search:
    get:
      summary: Search users by username
      operationId: searchUsers
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/profile:
    get:
      summary: Get user profile with stats
      operationId: getUserProfile
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User profile with stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /hugs/{userId}:
    post:
      summary: Suggest a hug to a user
      operationId: suggestHug
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Hug suggestion created (pending)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hug'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /hugs/{hugId}/accept:
    post:
      summary: Accept a pending hug suggestion
      operationId: acceptHug
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: hugId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hug accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hug'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '410':
          $ref: '#/components/responses/Gone'

  /hugs/{hugId}/decline:
    post:
      summary: Decline a pending hug suggestion
      operationId: declineHug
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: hugId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hug declined
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '410':
          $ref: '#/components/responses/Gone'

  /hugs/{hugId}/cancel:
    post:
      summary: Cancel your own outgoing pending hug
      operationId: cancelHug
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: hugId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hug cancelled
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '410':
          $ref: '#/components/responses/Gone'

  /hugs/inbox:
    get:
      summary: Get pending incoming hug suggestions
      operationId: getHugInbox
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Pending hug suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingHugInboxItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hugs/outgoing:
    get:
      summary: Get current user's outgoing pending hugs and slot info
      operationId: getOutgoingHugs
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Outgoing pending hugs with slot info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutgoingHugsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hugs/slots/buy:
    post:
      summary: Buy an additional hug suggestion slot
      operationId: buyHugSlot
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Slot purchased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuySlotResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /hugs/inbox/count:
    get:
      summary: Get count of pending incoming suggestions
      operationId: getHugInboxCount
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Inbox count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxCount'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hugs/cooldown/{userId}:
    get:
      summary: Check cooldown status for a user pair
      operationId: getCooldown
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cooldown info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CooldownInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hugs/cooldown/{userId}/upgrade:
    post:
      summary: Upgrade (reduce) cooldown by spending balance
      operationId: upgradeCooldown
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cooldown upgraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CooldownInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hugs/history:
    get:
      summary: Get hug history for current user
      operationId: getHugHistory
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Hug history
          content:
            application/json:
              schema:
                type: array
                items:
